name = "memos-worker"
compatibility_date = "2025-08-19"
main = "src/index.js"
[assets]
directory = "./src/public"
run_worker_first = [
	"/api/*"
]

[[d1_databases]]
binding = "DB"
database_id = "3f98a4bd-360e-4355-a70a-cd34342b8e2f"
database_name = "notes-dbs"

[[kv_namespaces]]
binding = "NOTES_KV"
id = "135886384170427a99432f8c077a657f"
preview_id = ""

[[r2_buckets]]
binding = "NOTES_R2_BUCKET"
bucket_name = "notes-r2-bucket"
preview_bucket_name = "notes-files-preview"
