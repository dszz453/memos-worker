name = "memos-worker"
compatibility_date = "2025-08-19"
main = "src/index.js"
[assets]
directory = "./src/public"
run_worker_first = [
	"/api/*"
]

[[d1_databases]]
binding = "DB"
database_id = "c90bf2e1-95f6-422d-9e10-d699f13832dd"
database_name = "memonotes"

[[kv_namespaces]]
binding = "NOTES_KV"
id = "ac7ac49d98ff419a87078e3666d18b8e"
preview_id = ""

[[r2_buckets]]
binding = "NOTES_R2_BUCKET"
bucket_name = "memonotes"
preview_bucket_name = "notes-files-preview"
